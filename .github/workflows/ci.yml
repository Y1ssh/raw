name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        working-directory: apps/backend
        run: uv sync
      - name: Lint (ruff)
        working-directory: apps/backend
        run: uv run ruff check .
      - name: Type check (mypy)
        working-directory: apps/backend
        run: uv run mypy src
      - name: Test (pytest)
        working-directory: apps/backend
        run: uv run pytest -q

  # frontend job is added in Sprint 3 when the shell lands
